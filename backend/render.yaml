services:
  - type: web
    name: egg-market-backend
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: egg-market-db
          property: connectionString
      - key: PORT
        value: 3001
      - key: FRONTEND_URL
        value: "https://your-frontend-url.vercel.app" # REPLACE THIS

databases:
  - name: egg-market-db
    databaseName: eggmarket
    user: admin
